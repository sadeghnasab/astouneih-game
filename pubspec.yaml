name: tat
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  audioplayers: ^6.6.0
  shared_preferences: ^2.5.4
  confetti: ^0.8.0
  share_plus: ^12.0.1
  http: ^1.6.0
  url_launcher: ^6.3.2
  shimmer: ^3.0.0
  supabase_flutter: ^2.12.2
  socket_io_client: ^3.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/data/tati_words.json
    - assets/images/
    - assets/audio/

  fonts:
    - family: Piramooz
      fonts:
        - asset: assets/fonts/piramooz.ttf
    - family: Morvarid
      fonts:
        - asset: assets/fonts/morvarid.ttf

# ==========================================
# تنظیمات آیکون اصلی برنامه (فدک تات)
# ==========================================
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/icon.png"

# ==========================================
# تنظیمات صفحه ورود سریع (بدون کادر اضافه)
# ==========================================
flutter_native_splash:
  color: "#000000"
  image: "assets/images/shield.png" # اینجا رو گذاشتم روی سپر که حماسی‌تر باشه
  fullscreen: true
  android: true
  # این بخش برای گوشی‌های جدید (اندروید ۱۲ به بالا) حیاتیه:
  android_12:
    color: "#000000"
    image: "assets/images/shield.png"